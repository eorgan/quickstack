services:
  kestra-scheduler:
    image: kestra/kestra:latest
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    user: "root"
    command: server scheduler
    volumes:
      - kestra_data:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - kestra_wd:/tmp/kestra-wd
    networks:
      - network_public
    environment:
      KESTRA_CONFIGURATION: &common_configuration |
        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/kestra
            driver-class-name: org.postgresql.Driver
            username: postgres
            password: QT0xUTHY5NkfQFm3eqlKYnpbFTE5tEy7vbKGuUAyIyxrTZQoNe
        kestra:
          server:
            basic-auth:
              username: "eliezer@organ.dev.br"
              password: "Kestra1234!"
          repository:
            type: postgres
          storage:
            type: local
            local:
              base-path: "/app/storage"
          queue:
            type: postgres
          tasks:
            tmp-dir:
              path: /tmp/kestra-wd/tmp

  kestra-worker:
    image: kestra/kestra:latest
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    user: "root"
    command: server worker
    volumes:
      - kestra_data:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - kestra_wd:/tmp/kestra-wd
    networks:
      - network_public
    environment:
      KESTRA_CONFIGURATION: *common_configuration

  kestra-executor:
    image: kestra/kestra:latest
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    user: "root"
    command: server executor
    volumes:
      - kestra_data:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - kestra_wd:/tmp/kestra-wd
    networks:
      - network_public
    environment:
      KESTRA_CONFIGURATION: *common_configuration

  kestra-webserver:
    image: kestra/kestra:latest
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - traefik.http.routers.kestra.rule=Host(`flow.organ.dev.br`)
        - traefik.http.routers.kestra.entrypoints=websecure
        - traefik.http.routers.kestra.tls.certresolver=letsencryptresolver
        - traefik.http.routers.kestra.service=kestra
        - traefik.http.services.kestra.loadbalancer.server.port=8080
    user: "root"
    command: server webserver
    volumes:
      - kestra_data:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - kestra_wd:/tmp/kestra-wd
    networks:
      - network_public
    environment:
      KESTRA_CONFIGURATION: *common_configuration
      KESTRA_URL: https://flow.organ.dev.br/

volumes:
  kestra_wd:
  kestra_data:
    external: true
    name: kestra_data

networks:
  network_public:
    external: true
    name: network_public
