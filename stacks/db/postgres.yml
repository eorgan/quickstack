services:
  postgres:
    image: pgvector/pgvector:pg17
    networks:
      - network_public
    command: ["postgres", "-c", "listen_addresses=*", "-c", "max_connections=200"]
    # ports:
    #   - 5432:5432
    environment:
      - POSTGRES_PASSWORD=QT0xUTHY5NkfQFm3eqlKYnpbFTE5tEy7vbKGuUAyIyxrTZQoNe
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
    volumes:
      - postgres-data:/var/lib/postgresql/data
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "2"
          memory: 2048M
      labels:
        - traefik.enable=true # enable it if will expose
        - traefik.tcp.routers.postgres.rule=HostSNI(`*`)
        - traefik.tcp.routers.postgres.entrypoints=pgsecure
        - traefik.tcp.routers.postgres.service=postgres
        # Removendo TLS (Traefik vira apenas um proxy TCP, deixa o Postgres lidar com SSL se quiser)
        # - traefik.tcp.routers.postgres.tls=true
        # - traefik.tcp.routers.postgres.tls.certresolver=letsencryptresolver
        - traefik.tcp.routers.postgres.loadbalancer.server.port=5432
        # Removendo whitelist por enquanto para facilitar debug
        # - traefik.tcp.middlewares.pgwhitelist.ipwhitelist.sourcerange=0.0.0.0/0 
        # - traefik.tcp.routers.postgres.middlewares=pgwhitelist@swarm
volumes:
  postgres-data:
    external: true
    name: postgres_data
networks:
  network_public:
    external: true
    name: network_public